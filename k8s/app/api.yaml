apiVersion: apps/v1
kind: Deployment
metadata:
  name: tahseen-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tahseen-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tahseen-api
    spec:
      containers:
        - name: api
          image: kandlagifari/tahseen-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: redis:6379
            - name: PORT
              value: "8080"
            - name: OTEL_SERVICE_NAME
              value: tahseen-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tahseen-api
spec:
  selector:
    app.kubernetes.io/name: tahseen-api
  ports:
    - port: 8080
      targetPort: 8080
