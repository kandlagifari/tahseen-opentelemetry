apiVersion: apps/v1
kind: Deployment
metadata:
  name: tahseen-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tahseen-web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tahseen-web-ui
    spec:
      containers:
        - name: web-ui
          image: kandlagifari/tahseen-web-ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tahseen-web-ui
spec:
  selector:
    app.kubernetes.io/name: tahseen-web-ui
  ports:
    - port: 80
      targetPort: 80
