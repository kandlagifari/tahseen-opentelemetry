apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.3.0
          envFrom:
            - configMapRef:
                name: grafana-env-config
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: grafana-datasources.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/provider.yaml
              subPath: grafana-dashboard-provider.yaml
            - name: slo-dashboard
              mountPath: /etc/grafana/provisioning/dashboards/slo-dashboard.json
              subPath: slo-dashboard.json
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: slo-dashboard
          configMap:
            name: grafana-slo-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
